<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Amor ❤️</title>

<style>

body{
    margin:0;
    padding:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background: linear-gradient(to bottom, #dfe9f3, #ffffff);
    overflow:hidden;
    font-family: Arial, sans-serif;
}

.mensaje{
    background:white;
    padding:40px;
    border-radius:25px;
    width:70%;
    max-width:500px;
    text-align:center;
    box-shadow:0 0 25px rgba(0,0,0,0.12);
    animation: aparecer 2s ease;
    z-index:2;
}

h1{
    color:#7c3aed;
    margin-bottom:20px;
}

p{
    color:#555;
    font-size:20px;
    line-height:1.6;
}

.corazon{
    position:absolute;
    font-size:25px;
    animation: flotar linear infinite;
    opacity:0.7;
}

@keyframes aparecer{
    from{
        opacity:0;
        transform:scale(0.7);
    }
    to{
        opacity:1;
        transform:scale(1);
    }
}

@keyframes flotar{
    0%{
        transform:translateY(100vh);
        opacity:0;
    }

    100%{
        transform:translateY(-120vh);
        opacity:1;
    }
}

</style>
</head>

<body>

<div class="mensaje">

<h1>❤️ Amor ❤️</h1>

<p>
Te quiero mucho.<br><br>

Sé que estos días hemos tenido malentendidos,
pero eres todo lo que quiero en mi vida.<br><br>

Gracias por estar conmigo ✨
</p>

</div>

<script>

for(let i=0; i<30; i++){

    let corazon = document.createElement("div");

    corazon.innerHTML = "🤍";

    corazon.classList.add("corazon");

    corazon.style.left = Math.random() * 100 + "vw";

    corazon.style.animationDuration =
    (Math.random() * 5 + 3) + "s";

    corazon.style.fontSize =
    (Math.random() * 20 + 20) + "px";

    document.body.appendChild(corazon);
}

</script>

</body>
</html>
